ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }

    application {
        modules = [com.example.warehouse_accounting_server.ApplicationKt.module]
    }
}

warehouse {
    database {
        jdbcUrl = "jdbc:postgresql://localhost:5432/warehouse_db"
        jdbcUrl = ${?JDBC_URL}
        user = "warehouse_user"
        user = ${?DB_USER}
        password = "warehouse_password"
        password = ${?DB_PASSWORD}
        maxPoolSize = 10
    }

    jwt {
        secret = "dev-only-change-in-production-use-long-random-secret-key-for-hs256-256bit-min"
        secret = ${?JWT_SECRET}
        issuer = "warehouse-accounting"
        audience = "warehouse-clients"
        realm = "Warehouse Accounting"
        accessTokenTtlSeconds = 3600
    }
}
