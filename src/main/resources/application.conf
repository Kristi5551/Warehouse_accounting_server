# Конфигурация сервера WarehouseAccounting.
#
# Схема: Android Emulator → http://10.0.2.2:8080 → Ktor (порт 8080) → PostgreSQL (localhost:5433 в Docker).
#
# ПОЧЕМУ ПОРТ 5433?
# Порт 5432 — стандартный порт PostgreSQL. На машинах разработчика часто уже запущен
# локальный PostgreSQL на этом порту. Docker-контейнер использует хост-порт 5433,
# чтобы не конфликтовать с локальным сервером.
#
# Переопределение через переменные окружения:
#   JDBC_URL    — полный JDBC URL (например, если используете другой порт)
#   DB_USER     — пользователь БД
#   DB_PASSWORD — пароль БД
#   JWT_SECRET  — секрет для JWT-токенов (меняйте в production)

ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }

    application {
        modules = [com.example.warehouse_accounting_server.ApplicationKt.module]
    }
}

warehouse {
    database {
        jdbcUrl = "jdbc:postgresql://localhost:5433/warehouse_db?connectTimeout=10&socketTimeout=30"
        jdbcUrl = ${?JDBC_URL}
        user = "warehouse_user"
        user = ${?DB_USER}
        password = "warehouse_password"
        password = ${?DB_PASSWORD}
        maxPoolSize = 10
    }

    jwt {
        secret = "change-this-secret-for-local-development"
        secret = ${?JWT_SECRET}
        issuer = "warehouse-accounting"
        audience = "warehouse-accounting-users"
        realm = "warehouse-accounting"
        expirationMillis = 86400000
    }
}
