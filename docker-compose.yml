# PostgreSQL для WarehouseAccounting.
# Запуск: docker compose up -d
#
# ПОЧЕМУ ПОРТ 5433?
# Порт 5432 — стандартный порт PostgreSQL. На многих машинах разработчика уже
# установлен и запущен локальный PostgreSQL именно на этом порту.
# Если Docker-контейнер попытается занять 5432, он не запустится (port conflict),
# и Ktor ошибочно подключится к локальному PostgreSQL вместо Docker-контейнера.
# Порт 5433 позволяет запускать Docker-контейнер без конфликтов.
#
# Схема: Android Emulator → http://10.0.2.2:8080 → Ktor (порт 8080) → PostgreSQL в Docker (localhost:5433).

services:
  postgres:
    image: postgres:16-alpine
    container_name: warehouse-postgres
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
    ports:
      - "5433:5432"
    volumes:
      - warehouse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d warehouse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  warehouse_pg_data:
